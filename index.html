<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <style>
      * {
        box-sizing: border-box;
      }
      .container {
        margin: 0 auto;
        padding: 5px;
      }

      .line {
        display: flex;
        width: 100%;
        gap: 1px;
        margin-block: 1px;
      }
      .square {
        border: 1px solid black;

        aspect-ratio: 1;

        flex: 1;
      }
    </style>
    <div class="container">
      <h1>Etch-A-Sketch</h1>
      <p class="description">
        <span>16 x 16 grid</span>
        <button id="change-grid">Change grid size</button>
      </p>
    </div>

    <script>
      createSquareDivs(10);

      document.querySelectorAll(".square").forEach((square) => {
        square.addEventListener("mouseover", changeColorOnMouseOver);
      });

      function createSquareDivs(gridSize = 16) {
        const container = document.querySelector(".container");

        for (let line = 1; line <= gridSize; line++) {
          const lineDiv = document.createElement("div");
          lineDiv.classList.add("line");
          container.appendChild(lineDiv);
          for (let square = 1; square <= gridSize; square++) {
            const squareDiv = document.createElement("div");
            squareDiv.classList.add("square");
            lineDiv.appendChild(squareDiv);
          }
        }
      }

      function changeColorOnMouseOver(event) {
        event.target.style.backgroundColor = "cyan";
      }
    </script>
  </body>
</html>
