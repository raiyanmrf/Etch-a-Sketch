<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      .container {
        margin: 0 auto;
        padding: 5px;
        width: 100%;
      }

      .description {
        display: flex;
        flex-flow: row wrap;
        align-items: center;
        gap: 10px;
      }
      .title {
        margin-right: auto;
      }

      .grid {
        height: 90vh;
        width: 100%;
        display: flex;

        flex-direction: column;
        overflow: auto;
      }

      .line {
        display: flex;
        flex: 1;
      }
      .square {
        border: 0.5px solid rgb(158, 158, 158);

        aspect-ratio: 1;
      }
    </style>
    <section class="container">
      <div class="description">
        <h1 class="title">Etch-A-Sketch</h1>
        <p class="grid-size"><span id="grid-size">16 x 16 </span> grid</p>
        <button id="change-grid">Change grid size</button>
      </div>

      <div class="grid"></div>
    </section>

    <script>
      createSquareDivs(10);

      document
        .querySelector("#change-grid")
        .addEventListener("click", changeGridSize);

      function createSquareDivs(gridSize = 16) {
        const grid = document.querySelector(".grid");

        grid.replaceChildren();

        for (let line = 1; line <= gridSize; line++) {
          const lineDiv = document.createElement("div");
          lineDiv.classList.add("line");
          grid.appendChild(lineDiv);
          for (let square = 1; square <= gridSize; square++) {
            const squareDiv = document.createElement("div");
            squareDiv.classList.add("square");
            lineDiv.appendChild(squareDiv);
            squareDiv.addEventListener("mouseover", changeColorOnMouseOver);
          }
        }
      }

      function changeColorOnMouseOver(event) {
        event.target.style.backgroundColor = "cyan";
      }

      function changeGridSize() {
        const gridSize = +prompt("Enter the grid size");
        const container = document.querySelector(".container");
        createSquareDivs(gridSize);
      }
    </script>
  </body>
</html>
